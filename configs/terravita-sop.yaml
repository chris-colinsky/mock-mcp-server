# yaml-language-server: $schema=../schemas/mock-mcp-config.schema.json
openapi: 3.1.0
info:
  title: Terravita S&OP API (mock)
  description: |
    Mock of the Terravita Sales & Operations Planning briefing endpoint.
    The real backend reads sales CSV → calculates supply-chain metrics in
    Pandas → asks an LLM for an executive narrative. This profile returns
    plausible synthetic data with the same response shape so an agent can
    be evaluated without an LLM round-trip.

    Source repo this is modeled on:
    https://github.com/chris-colinsky/deterministic-ai-agent-pattern
  version: 1.0.0

# --- mock-mcp framework extensions ---------------------------------------

x-mock-port: 8002

# The real Terravita backend is unauthenticated; including bearer auth here
# anyway to demo the framework's auth feature. Drop this block to make the
# mock open.
x-mock-auth:
  type: bearer
  token_env: BEARER_TOKEN
  default: mock-test-token

x-mock-mcp:
  mount_path: /mcp
  exclude_tags: [root, health]
  forward_headers: [authorization]

# --- API surface ---------------------------------------------------------

paths:

  /api/v1/generate-sop:
    get:
      tags: [S&OP]
      summary: Generate weekly S&OP briefing
      operationId: generate_sop
      description: |
        Returns the full SOPResponse — KPI metrics, at-risk SKU table,
        and the LLM-authored executive briefing.
      security:
        - BearerAuth: []

      x-mock-dynamic:
        # No `seed_from`: the real endpoint takes no params and the LLM call
        # is non-deterministic, so each request returns a fresh response.
        # Add `seed_from: query.seed` plus a corresponding query parameter
        # if you want reproducible output for snapshot testing.
        response:
          status: { static: success }

          metrics:
            # The real total is the sum of Revenue_M4 across the *whole*
            # catalog (not just at-risk SKUs), so it's larger than the sum
            # of red_flag_data revenues below.
            total_m4_revenue:
              random_float:
                range: [180000, 320000]
                round: 2
            skus_at_risk: { static: 4 }   # must equal len(red_flag_data)

          # Fixed-length list of 4 SKUs. The framework doesn't yet have a
          # variable-length "random_list" recipe, so each item is declared
          # explicitly. That also makes the output more visibly structured
          # when humans poke at it via /docs or Forbin.
          red_flag_data:
            - SKU:
                template:
                  format: "TV-{n}-DRY"
                  vars:
                    n:
                      faker: { provider: pyint, kwargs: { min_value: 100, max_value: 999 } }
              Effective_Months_Cover: { random_float: { range: [0.4, 1.8], round: 2 } }
              Target_Months_Cover: { static: 3 }
              Suggested_Reorder_Qty: { random_int: [180, 720] }
              Revenue_M4: { random_float: { range: [4500, 18000], round: 2 } }

            - SKU:
                template:
                  format: "TV-{n}-RFR"
                  vars:
                    n:
                      faker: { provider: pyint, kwargs: { min_value: 100, max_value: 999 } }
              Effective_Months_Cover: { random_float: { range: [0.6, 2.2], round: 2 } }
              Target_Months_Cover: { static: 4 }
              Suggested_Reorder_Qty: { random_int: [90, 480] }
              Revenue_M4: { random_float: { range: [3200, 14000], round: 2 } }

            - SKU:
                template:
                  format: "TV-{n}-CHL"
                  vars:
                    n:
                      faker: { provider: pyint, kwargs: { min_value: 100, max_value: 999 } }
              Effective_Months_Cover: { random_float: { range: [0.3, 1.5], round: 2 } }
              Target_Months_Cover: { static: 3 }
              Suggested_Reorder_Qty: { random_int: [240, 960] }
              Revenue_M4: { random_float: { range: [2800, 11000], round: 2 } }

            - SKU:
                template:
                  format: "TV-{n}-DRY"
                  vars:
                    n:
                      faker: { provider: pyint, kwargs: { min_value: 100, max_value: 999 } }
              Effective_Months_Cover: { random_float: { range: [0.7, 2.0], round: 2 } }
              Target_Months_Cover: { static: 4 }
              Suggested_Reorder_Qty: { random_int: [150, 540] }
              Revenue_M4: { random_float: { range: [5200, 22000], round: 2 } }

          # Placeholder; the real briefing is rendered in `derived` below where
          # {ref: /metrics/...} can read the just-generated values.
          llm_briefing: { static: "" }

        # Templates that reference other generated fields via {ref: ...} must
        # live in `derived` rather than `response`, because ctx.root (what
        # /pointer/paths resolve against) is only populated after the response
        # walk completes. Templates that only use {from: query.X} or {now: true}
        # can sit anywhere.
        derived:
          - path: /llm_briefing
            value:
              template:
                format: |
                  # Weekly S&OP Briefing

                  ## Executive Summary

                  Most-recent-month catalog revenue tracked at **${total}** across all SKUs, with **{at_risk} SKUs flagged as at-risk** of stockout within the next planning cycle. Inventory cover for these SKUs is below their respective targets and replenishment quantities have been computed.

                  ## Recommended Actions

                  1. Place purchase orders for the {at_risk} flagged SKUs immediately — see the at-risk table for suggested quantities.
                  2. Validate vendor lead times before committing the orders. Two SKUs in the DRY category have shown elevated forecast variance in M3-M4.
                  3. Review velocity assumptions for the RFR-class SKU; effective cover has dropped two consecutive weeks.

                  ## Notes

                  - This briefing reflects month-4 actuals only; week-level granularity will land in the next sprint.
                  - Reorder quantities assume default safety-stock targets per SKU class.

                  _Generated at {now} by the Terravita S&OP service (mock)._
                vars:
                  total: { ref: /metrics/total_m4_revenue }
                  at_risk: { ref: /metrics/skus_at_risk }
                  now: { now: true }

      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SOPResponse'

  # NOTE: the real backend has a second endpoint, GET /api/v1/download-pos,
  # that streams a CSV file. We deliberately don't mock it — file downloads
  # don't translate cleanly to MCP tool calls (tools return structured
  # content blocks, not files). A proper MCP-shaped equivalent would be a
  # `get_pending_purchase_orders` tool returning the rows as a JSON array.

# --- schemas (mirroring backend/schemas.py) ------------------------------

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer

  schemas:

    SOPMetrics:
      type: object
      title: SOPMetrics
      description: Top-level KPI summary for the dashboard.
      required: [total_m4_revenue, skus_at_risk]
      properties:
        total_m4_revenue:
          type: number
          description: Sum of Revenue_M4 across all SKUs.
        skus_at_risk:
          type: integer
          description: Count of SKUs where Is_At_Risk is True.

    RedFlagItem:
      type: object
      title: RedFlagItem
      description: Data for a single at-risk SKU displayed in the dashboard table.
      required: [SKU, Effective_Months_Cover, Target_Months_Cover, Suggested_Reorder_Qty, Revenue_M4]
      properties:
        SKU: { type: string, description: Product identifier. }
        Effective_Months_Cover:
          type: number
          description: Months of cover including in-transit stock.
        Target_Months_Cover:
          type: integer
          description: Company's desired minimum cover.
        Suggested_Reorder_Qty:
          type: integer
          description: Calculated units to order today.
        Revenue_M4:
          type: number
          description: Most recent month's revenue contribution.

    SOPResponse:
      type: object
      title: SOPResponse
      description: Full API response from GET /api/v1/generate-sop.
      required: [status, metrics, red_flag_data, llm_briefing]
      properties:
        status:
          type: string
          description: Always "success" on a 200 response.
        metrics:
          $ref: '#/components/schemas/SOPMetrics'
        red_flag_data:
          type: array
          items:
            $ref: '#/components/schemas/RedFlagItem'
        llm_briefing:
          type: string
          description: Markdown briefing authored by the LLM.
