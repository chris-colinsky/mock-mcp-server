  # publish:
  #   needs: build
  #   runs-on: ubuntu-latest
  #   environment: pypi
  #   permissions:
  #     id-token: write
  #   steps:
  #     - name: Download artifacts
  #       uses: actions/download-artifact@v8
  #       with:
  #         name: dist
  #         path: dist/
  #     - name: Publish to PyPI
  #       uses: pypa/gh-action-pypi-publish@release/v1
  #
  # For a Homebrew tap, model after the update-homebrew job in
  # https://github.com/chris-colinsky/forbin-mcp/blob/main/.github/workflows/release.yml
